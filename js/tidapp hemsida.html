<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tidapp</title>
<link rel="stylesheet" href="style tidapp.css">
</head>
<body>

<div class="screen">

  <div class="tabs">
    <button onclick="showPage('uppgifter')">Aktiviteter</button>
    <button onclick="showPage('aktiviteter')">Uppgifter</button>
  </div>

  <div id="uppgifter" class="page active">
    <div class="flex">
      <div class="sidebar">
        <div class="header-row">
          <div class="box">aktiviteter</div>
          <div class="plus">+</div>
        </div>
        <div class="box">javascript</div>
        <div class="box">php</div>
        <div class="box">html</div>
      </div>

      <div class="main">
        <div class="table"></div>
        <div class="chart"></div>
      </div>
    </div>
  </div>

  <div id="aktiviteter" class="page">
    <div class="header-row">
      <div class="box" style="width:200px;">Uppgifter</div>
      <div class="plus">+</div>
    </div>

    <div class="task-table">
      <div class="box">datum</div>
      <div class="box">tid/datum</div>
      <div class="box">aktivitet</div>
      <div class="box">beskrivning</div>
    </div>
  </div>
</div>

<script>
function showPage(pageId){
  document.querySelectorAll('.page').forEach(page=>{
    page.classList.remove('active');
  });
  document.getElementById(pageId).classList.add('active');
}
</script>

</body>
<script src="./js/main.js"></script>
<script scr="./js/index.js"></script>
</html>
